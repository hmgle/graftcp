## mgraftcp configuration

## SOCKS5 address. Default: 127.0.0.1:1080
# socks5 = 127.0.0.1:1080

## SOCKS5 username/password
# socks5_username =
# socks5_password =

## HTTP proxy address, e.g. 127.0.0.1:8080
# http_proxy =

## Proxy selection mode: auto | random | only_http_proxy | only_socks5 | direct
# select_proxy_mode = auto

## The IP/CIDR in black-ip-file will connect direct
# blackip_file_path =

## Only redirect connects whose destination IP/CIDR appears in white-ip-file
# whiteip_file_path =

## Whether local addresses should still be ignored. Default: true
# ignore_local = true

## Drop privileges and run the traced command as this user
# username =
